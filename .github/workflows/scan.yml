name: Stockme Scan

on:
  schedule:
    # Alle 30 Min, Mo-Fr, 13-22 UTC (grob US-Handelszeit inkl. Vor-/Nachbörse, DST unberücksichtigt).
    # Krypto läuft 24/7 - wird mit diesem Zeitplan nur während der US-Handelszeit mitgescannt.
    # Für durchgehende Krypto-Abdeckung: zusätzlichen Cron-Eintrag ohne Tages-/Stundenbeschränkung ergänzen.
    - cron: "*/30 13-22 * * 1-5"
  workflow_dispatch: {}  # manuelles Auslösen über den "Run workflow"-Button

permissions:
  contents: write  # damit der State (data/state.db) zurückcommitet werden kann

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies installieren
        run: pip install -r requirements.txt

      - name: Scanner ausführen
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python -m src.main

      - name: State & Dashboard zurückcommitten
        run: |
          git config user.name "stockme-bot"
          git config user.email "stockme-bot@users.noreply.github.com"
          git add data/state.db docs/index.html
          git diff --staged --quiet || git commit -m "Update alert state & dashboard"
          git push
