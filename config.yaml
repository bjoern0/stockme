# Krypto läuft 24/7 (kein Handelsschluss) und ist i.d.R. deutlich volatiler als Aktien.
# Nutzt vorerst dieselben Indikator-Schwellwerte wie Aktien (siehe "indicators" unten) -
# ggf. später eigene, weniger empfindliche Schwellwerte für Krypto ergänzen.
crypto_watchlist:
  - symbol: SOL-USD   # Solana
    category: Crypto
  - symbol: BTC-USD   # Bitcoin
    category: Crypto
  - symbol: ETH-USD   # Ethereum
    category: Crypto
  - symbol: XRP-USD   # XRP
    category: Crypto

# Eine zusätzliche Watchlist für breiteres Screening.
# Hier können Sie z.B. alle Werte eines Index (S&P 500) oder eine eigene, größere Liste
# von potenziellen "Geheimtipps" eintragen, die Sie mit den definierten Indikatoren scannen möchten.
# Diese Liste wird für den Reddit-Scan und die technische Analyse verwendet.
screening_watchlist:
  - symbol: GME    # GameStop (oft Reddit-relevant)
    category: Retail
  - symbol: BB     # BlackBerry (oft Reddit-relevant)
    category: Software
  - symbol: NOK    # Nokia (oft Reddit-relevant)
    category: Telecom
  - symbol: CLOV   # Clover Health (oft Reddit-relevant)
    category: Healthcare
  - symbol: WISH   # ContextLogic Inc. (oft Reddit-relevant)
    category: E-commerce
  - symbol: AMC    # AMC Entertainment (oft Reddit-relevant)
    category: Entertainment
  - symbol: PLTR   # Palantir Technologies
    category: Software
  - symbol: RIVN   # Rivian Automotive
    category: Automotive
  - symbol: COIN   # Coinbase Global
    category: Crypto Exchange
  - symbol: MSTR   # MicroStrategy (Bitcoin-Bezug)
    category: Software
  - symbol: U      # Unity Software
    category: Gaming
  - symbol: SNOW   # Snowflake
    category: Software

indicators:
  rsi_period: 14
  rsi_oversold: 30
  rsi_overbought: 70
  sma_short: 20
  sma_long: 50
  bollinger_period: 20
  bollinger_stddev: 2
  volume_lookback: 20
  volume_spike_multiplier: 2.0
  support_resistance_window: 20  # Tage für Swing-Hoch/-Tief (Breakout/Breakdown-Signale)
  atr_period: 14

# Marktweite Top-Mover/-Loser via Yahoo-Finance-Screener (yfinance.screen).
# Läuft unabhängig von der Watchlist, um "auffällige" Werte zu entdecken.
top_movers:
  enabled: true
  screens:
    - day_gainers
    - day_losers
    - most_actives
  count: 10               # wie viele Ergebnisse je Screen abgeholt werden
  min_percent_change: 5.0 # nur Werte mit mind. dieser Kursbewegung (%) melden

# Reddit-Sentiment (Platzhalter für die nächste Ausbaustufe).
# Sobald aktiviert: benötigt REDDIT_CLIENT_ID / REDDIT_CLIENT_SECRET als Secrets/Env-Vars.
reddit: # Aktiviert den Reddit-Scan
  enabled: false
  subreddits:
    - wallstreetbets
    - wallstreetbetsGer
    - Trumptrades
  min_mentions: 5   # Ticker-Erwähnungen im Zeitfenster, ab der ein Alert sinnvoll ist
  lookback_hours: 24

# FRED Economic Data (Federal Reserve Economic Data)
# Benötigt FRED_API_KEY als Secret/Env-Var.
fred:
  enabled: false # Auf 'true' setzen, um FRED-Daten abzurufen
  series:
    - id: FEDFUNDS # Federal Funds Rate
      name: Fed Funds Rate
    - id: CPIAUCSL # Consumer Price Index for All Urban Consumers
      name: CPI
    - id: UNRATE # Unemployment Rate
      name: Unemployment Rate
